name: Android CI - Build APK

on:
  # push:
  #   branches: [ main, develop ]
  #   tags:
  #     - 'v*'
  # pull_request:
  #   branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x scrcpy-mobile/gradlew

      - name: Build Debug APK
        working-directory: ./scrcpy-mobile
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename Debug APK
        run: |
          VERSION_NAME=$(awk -F= '/^VERSION_NAME=/ { print $2; exit }' scrcpy-mobile/gradle.properties)
          VERSION_CODE=$(awk -F= '/^VERSION_CODE=/ { print $2; exit }' scrcpy-mobile/gradle.properties)
          mkdir -p scrcpy-mobile/app/build/outputs/renamed_apks/debug
          find scrcpy-mobile/app/build/outputs/renamed_apks/debug -maxdepth 1 -name '*.apk' -delete
          find scrcpy-mobile/app/build/outputs/apk/debug -maxdepth 1 -name 'app-*-debug.apk' | while read -r apk; do
            name=$(basename "$apk")
            abi=${name#app-}
            abi=${abi%-debug.apk}
            cp -f "$apk" "scrcpy-mobile/app/build/outputs/renamed_apks/debug/Screen Remote-${abi}-${VERSION_NAME}_${VERSION_CODE}.apk"
          done

      - name: Upload Debug APK
        uses: actions/upload-artifact@v6
        with:
          name: scrcpy-mobile-debug-${{ github.sha }}
          path: scrcpy-mobile/app/build/outputs/renamed_apks/debug/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ./scrcpy-mobile
        run: ./gradlew assembleRelease --stacktrace || ./gradlew assembleDebug --stacktrace

      - name: Rename Release APK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION_NAME=$(awk -F= '/^VERSION_NAME=/ { print $2; exit }' scrcpy-mobile/gradle.properties)
          VERSION_CODE=$(awk -F= '/^VERSION_CODE=/ { print $2; exit }' scrcpy-mobile/gradle.properties)
          mkdir -p scrcpy-mobile/app/build/outputs/renamed_apks/release
          find scrcpy-mobile/app/build/outputs/renamed_apks/release -maxdepth 1 -name '*.apk' -delete
          if find scrcpy-mobile/app/build/outputs/apk/release -maxdepth 1 -name 'app-*-release.apk' | grep -q .; then
            find scrcpy-mobile/app/build/outputs/apk/release -maxdepth 1 -name 'app-*-release.apk' | while read -r apk; do
              name=$(basename "$apk")
              abi=${name#app-}
              abi=${abi%-release.apk}
              cp -f "$apk" "scrcpy-mobile/app/build/outputs/renamed_apks/release/Screen Remote-${abi}-${VERSION_NAME}_${VERSION_CODE}.apk"
            done
          else
            mkdir -p scrcpy-mobile/app/build/outputs/renamed_apks/debug
            find scrcpy-mobile/app/build/outputs/renamed_apks/debug -maxdepth 1 -name '*.apk' -delete
            find scrcpy-mobile/app/build/outputs/apk/debug -maxdepth 1 -name 'app-*-debug.apk' | while read -r apk; do
              name=$(basename "$apk")
              abi=${name#app-}
              abi=${abi%-debug.apk}
              cp -f "$apk" "scrcpy-mobile/app/build/outputs/renamed_apks/debug/Screen Remote-${abi}-${VERSION_NAME}_${VERSION_CODE}.apk"
            done
          fi

      - name: Upload Release APK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: scrcpy-mobile-release-${{ github.ref_name }}
          path: |
            scrcpy-mobile/app/build/outputs/renamed_apks/release/*.apk
            scrcpy-mobile/app/build/outputs/renamed_apks/debug/*.apk
          retention-days: 90

  release:
    name: Create GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: scrcpy-mobile-release-${{ github.ref_name }}
          path: ./apk-release

      - name: Create Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: Scrcpy Mobile ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./apk-release/**/*.apk
          body: |
            ## 🎉 Scrcpy Mobile ${{ github.ref_name }}

            ### 📦 下载
            - **Release APK**: 已签名的生产版本（如果配置了签名）
            - **Debug APK**: 调试版本（如果 Release 构建失败）

            ### 📝 更新日志
            查看提交历史了解本次发布的详细更改。

            ### ⚙️ 系统要求
            - Android 7.0 (API 24) 或更高版本
            - 支持架构: arm64-v8a, armeabi-v7a, x86, x86_64

            ### 🔗 链接
            - [GitHub 仓库](https://github.com/${{ github.repository }})
            - [问题反馈](https://github.com/${{ github.repository }}/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
